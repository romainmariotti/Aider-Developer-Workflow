<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
        </header>

        <div id="error-container" class="error-message" style="display: none;"></div>

        <section class="create-task-section">
            <h2>Create New Task</h2>
            <form id="create-task-form">
                <div class="form-group">
                    <label for="task-title">Title *</label>
                    <input type="text" id="task-title" name="title" required>
                    <span class="inline-error" id="title-error"></span>
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" name="description" rows="3"></textarea>
                </div>
                <button type="submit" id="submit-btn">Create Task</button>
            </form>
        </section>

        <section class="tasks-section">
            <div class="tasks-header">
                <h2>Tasks</h2>
                <span id="task-counter" class="task-counter">Tasks: 0</span>
            </div>
            <button id="clear-all-btn" class="clear-all-btn">Clear all</button>
            <div id="tasks-container">
                <p class="loading">Loading tasks...</p>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
